<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Room Allocation</title>
    
    <!-- Link to the CSS file for styling -->
    <link rel="stylesheet" href="project.css">
</head>
<body>


    <!-- SECTION 1: LOGIN PAGE -->
    <div id="login-section" class="login-box">
        <h2>Hostel Room Allocation</h2> 
        <p>Please enter your name to view rooms</p>
        <input type="text" id="username" placeholder="Enter your full name">
        <button class="btn" onclick="handleLogin()">Login</button>
    </div>

    <!-- SECTION 2: ROOM DASHBOARD -->
    <div id="dashboard-section" class="dashboard">
        <div class="header">
            <h2 id="welcome-text">Welcome</h2>
            <button class="btn logout-btn" onclick="handleLogout()">Logout</button>
        </div>
        
        <div class="room-grid" id="room-container">
            <!-- Rooms will appear here automatically -->
        </div>
    </div>

    <!-- Link to the JavaScript file for logic -->
    <script src="project.js"></script>
</body>
</html>
